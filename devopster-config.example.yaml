provider: github
organization: MicrosoftCloudEssentials-LearningHub

github:
  api_url: https://api.github.com
  token_env: GITHUB_TOKEN

azure_devops:
  organization_url: https://dev.azure.com/your-org
  project: your-project
  token_env: AZDO_TOKEN

gitlab:
  api_url: https://gitlab.com/api/v4
  token_env: GITLAB_TOKEN

default_branch: main
catalog:
  output_path: generated/catalog.json

templates:
  - name: azure-overview
    description: Base structure for Azure overview and demo repositories.
    topics:
      - azure
      - demo
      - overview
  - name: ai-agent
    description: Base structure for agent and AI repositories.
    topics:
      - ai
      - ai-agents
      - demo
