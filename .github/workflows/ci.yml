name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container image
        run: docker build -t devopster-cli-ci .
      - name: Run tests in container
        run: docker run --rm devopster-cli-ci make test
